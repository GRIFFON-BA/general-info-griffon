<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedankt - Griffon</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; text-align: center; padding: 50px; background: #f4f4f4; color: #0054a6; display: flex; justify-content: center; align-items: center; height: 80vh; }
        .success-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 320px; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 25px; background: #e30613; color: white; text-decoration: none; border-radius: 4px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="success-box">
        <h2 id="title"></h2>
        <p id="msg"></p>
        <a href="index.html" class="btn" id="btn-back"></a>
    </div>

    <script>
        const translations = {
            nl: { title: "Bedankt!", msg: "Uw aanvraag is succesvol verzonden. We nemen zo snel mogelijk contact op.", btn: "Terug naar Menu" },
            en: { title: "Thank you!", msg: "Your request has been successfully sent. We will contact you as soon as possible.", btn: "Back to Menu" }
        };
        const userLang = navigator.language.substring(0, 2);
        const content = translations[userLang] || translations.en;

        document.getElementById('title').innerText = content.title;
        document.getElementById('msg').innerText = content.msg;
        document.getElementById('btn-back').innerText = content.btn;
    </script>
</body>
</html>
